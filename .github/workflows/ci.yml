name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: byte-compile everything shipped
        run: python -m compileall -q tests
      - name: pytest (mock /v1 contract)
        run: |
          pip install --quiet pytest
          pytest tests/unit -q
